<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'">
  <title>0xpaste</title>
  <link rel="stylesheet" href="overlay.css">
</head>
<body>
  <div id="overlay-root">
    <div id="overlay-panel">

      <!-- Liquid glass layers (visible only in glass theme) -->
      <div class="liquidGlass-effect"></div>
      <div class="liquidGlass-tint"></div>
      <div class="liquidGlass-shine"></div>

      <!-- Content wrapper -->
      <div class="liquidGlass-text">

      <!-- Header -->
      <header class="overlay-header">
        <div class="header-top">
          <div class="app-title">0xpaste</div>
          <div class="header-actions">
            <button class="reset-btn" id="reset-defaults-btn">[reset]</button>
            <button id="settings-btn" class="btn-settings" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          </div>
        </div>
        <div class="header-bottom">
          <div class="app-subtitle">// clipboard history</div>
          <div class="header-hotkey" id="header-hotkey">toggle: ctrl + space</div>
        </div>
      </header>

      <!-- Clipboard view -->
      <div id="clipboard-view">

        <!-- Search -->
        <div class="search-area">
          <div class="search-wrap">
            <input
              type="text"
              id="search-input"
              placeholder="> search..."
              autocomplete="off"
              spellcheck="false"
            >
            <button class="search-clear" id="search-clear">[x]</button>
          </div>
        </div>

        <!-- Action bar -->
        <div class="action-bar">
          <button id="clear-all-btn">[clear all]</button>
        </div>

        <!-- Item list -->
        <div class="item-list-wrap">
          <div id="item-list"></div>
        </div>

      </div><!-- /clipboard-view -->

      <!-- Settings view (hidden by default) -->
      <div id="settings-view">

        <div class="settings-section">

          <!-- Typing speed -->
          <div class="settings-row">
            <span class="settings-label">// typing speed</span>
            <div class="seg-group" id="speed-group">
              <button class="seg-btn" data-val="slow">slow</button>
              <button class="seg-btn" data-val="medium">med</button>
              <button class="seg-btn" data-val="fast">fast</button>
              <button class="seg-btn" data-val="xfast">x-fast</button>
            </div>
          </div>

          <!-- Initial delay -->
          <div class="settings-row settings-col">
            <div class="settings-row-hdr">
              <span class="settings-label">// initial delay</span>
              <span class="settings-value" id="delay-value">2000ms</span>
            </div>
            <input type="range" id="delay-slider" min="0" max="4000" step="100" value="2000">
          </div>

          <!-- Auto enter -->
          <div class="settings-row">
            <span class="settings-label">// auto type enter</span>
            <label class="toggle-switch">
              <input type="checkbox" id="auto-enter-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>

          <!-- Start with Windows -->
          <div class="settings-row">
            <span class="settings-label">// start with windows</span>
            <label class="toggle-switch">
              <input type="checkbox" id="start-windows-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>

          <!-- Max history -->
          <div class="settings-row">
            <span class="settings-label">// max history</span>
            <div class="seg-group" id="history-group">
              <button class="seg-btn" data-val="10">10</button>
              <button class="seg-btn" data-val="25">25</button>
              <button class="seg-btn" data-val="50">50</button>
              <button class="seg-btn" data-val="75">75</button>
            </div>
          </div>

          <!-- Hotkey -->
          <div class="settings-row">
            <span class="settings-label">// hotkey</span>
            <div class="hotkey-wrap">
              <span class="hotkey-display" id="hotkey-display">ctrl + -</span>
              <button class="hotkey-set-btn" id="hotkey-capture-btn">set</button>
            </div>
          </div>

          <!-- Accent color -->
          <div class="settings-row">
            <span class="settings-label">// accent color</span>
            <input type="color" id="accent-color-input" value="#7C3AED">
          </div>

          <!-- Theme -->
          <div class="settings-row">
            <span class="settings-label">// theme</span>
            <div class="seg-group" id="theme-group">
              <button class="seg-btn" data-val="default">default</button>
              <button class="seg-btn" data-val="white">white</button>
              <button class="seg-btn" data-val="dark">dark</button>
              <button class="seg-btn" data-val="glass">glass</button>
            </div>
          </div>

          <!-- Panel position -->
          <div class="settings-row">
            <span class="settings-label">// panel position</span>
            <div class="seg-group" id="position-group">
              <button class="seg-btn" data-val="top-left" title="Top left">↖</button>
              <button class="seg-btn" data-val="top-right" title="Top right">↗</button>
              <button class="seg-btn" data-val="bottom-left" title="Bottom left">↙</button>
              <button class="seg-btn" data-val="bottom-right" title="Bottom right">↘</button>
            </div>
          </div>

        </div>

      </div><!-- /settings-view -->

      <!-- Footer -->
      <footer class="overlay-footer">
        <span class="status-text" id="status-text">:: 0/50 items</span>
        <span class="typing-indicator" id="typing-indicator">[typing... 0%]</span>
        <span class="cancel-hint" id="cancel-hint">Move your mouse to cancel typing.</span>
      </footer>

      </div><!-- /liquidGlass-text -->

    </div>
  </div>

  <!-- Liquid glass SVG filter (hidden, referenced by CSS filter on .liquidGlass-effect) -->
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.01" numOctaves="1" seed="5" result="turbulence"/>
      <feComponentTransfer in="turbulence" result="mapped">
        <feFuncR type="gamma" amplitude="1" exponent="10" offset="0.5"/>
        <feFuncG type="gamma" amplitude="0" exponent="1" offset="0"/>
        <feFuncB type="gamma" amplitude="0" exponent="1" offset="0.5"/>
      </feComponentTransfer>
      <feGaussianBlur in="turbulence" stdDeviation="3" result="softMap"/>
      <feSpecularLighting in="softMap" surfaceScale="5" specularConstant="1" specularExponent="100" lighting-color="white" result="specLight">
        <fePointLight x="-200" y="-200" z="300"/>
      </feSpecularLighting>
      <feComposite in="specLight" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litImage"/>
      <feDisplacementMap in="SourceGraphic" in2="softMap" scale="150" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <script src="glass-renderer.js"></script>
  <script src="overlay.js"></script>
</body>
</html>
